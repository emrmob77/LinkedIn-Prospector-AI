<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkedIn Prospector AI</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">

    <!-- Header -->
    <header class="header">
      <div class="header-top">
        <div class="header-brand">
          <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/>
            <rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/>
          </svg>
          <span class="header-title">Prospector AI</span>
        </div>
        <div id="connection-dot" class="connection-dot connection-checking" title="Bağlantı kontrol ediliyor...">
          <span class="connection-dot-inner"></span>
        </div>
      </div>
      <p id="connection-text" class="header-subtitle">Bağlantı kontrol ediliyor...</p>
    </header>

    <!-- Auth Bolumu (giris yapilmamissa) -->
    <section id="auth-section" class="section auth-section hidden">
      <div class="auth-card">
        <div class="auth-icon-wrapper">
          <svg class="auth-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <h3 class="auth-title">Giris Yap</h3>
        <p class="auth-desc">Prospector AI hesabinizla giris yapin</p>

        <div class="auth-form">
          <input id="login-email" type="email" class="auth-input" placeholder="E-posta adresiniz" />
          <input id="login-password" type="password" class="auth-input" placeholder="Sifreniz" />
          <div id="login-error" class="auth-error hidden"></div>
          <button id="btn-login" class="btn btn-primary btn-full">
            <span id="btn-login-text">Giris Yap</span>
            <span id="login-spinner" class="spinner hidden"></span>
          </button>
        </div>

        <p class="auth-hint">
          Hesabiniz yok mu? <a href="https://linked-in-prospector-ai.vercel.app/signup" target="_blank">Kayit Ol</a>
        </p>
      </div>
    </section>

    <!-- Ana Bolum (giris yapilmissa) -->
    <main id="main-section" class="section hidden">

      <!-- Sayfa Tipi Badge -->
      <div class="page-info-card">
        <div class="page-info-row">
          <span class="page-info-label">Mevcut Sayfa</span>
          <button id="btn-logout" class="btn-link btn-logout" title="Çıkış Yap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
        <span id="page-type-badge" class="badge badge-unknown">Kontrol ediliyor...</span>
      </div>

      <!-- Tara Butonu -->
      <button id="btn-scan" class="btn btn-primary btn-full btn-scan">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <span id="btn-scan-text">Sayfayı Tara</span>
        <span id="scan-spinner" class="spinner hidden"></span>
      </button>

      <!-- Post Listesi -->
      <div id="posts-card" class="posts-card hidden">
        <div class="posts-header">
          <span class="posts-title">Bulunan Postlar</span>
          <span id="post-count" class="badge badge-count">0</span>
        </div>
        <div id="post-list" class="post-list">
          <!-- Post itemleri JS ile doldurulacak -->
        </div>

        <!-- Ice Aktar Butonu -->
        <button id="btn-import" class="btn btn-success btn-full btn-import" disabled>
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          <span id="btn-import-text">Tümünü İçe Aktar</span>
          <span id="import-spinner" class="spinner hidden"></span>
        </button>

        <!-- Progress Bar -->
        <div id="progress-container" class="progress-container hidden">
          <div class="progress-bar">
            <div id="progress-fill" class="progress-fill" style="width: 0%"></div>
          </div>
          <p id="progress-text" class="progress-text">Aktarılıyor...</p>
        </div>
      </div>

      <!-- Bos durum (tarama yapilmamissa) -->
      <div id="empty-state" class="empty-state">
        <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
        </svg>
        <p class="empty-text">Henüz tarama yapılmadı</p>
        <p class="empty-hint">Yukarıdaki butona tıklayarak LinkedIn sayfasını tarayabilirsiniz.</p>
      </div>
    </main>

    <!-- Footer -->
    <footer id="footer" class="footer">
      <span id="last-scan-time" class="footer-text">Son tarama: --</span>
      <a id="btn-settings" class="footer-link" href="#" title="Ayarlar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </a>
    </footer>

    <!-- Toast Bildirim -->
    <div id="toast" class="toast hidden">
      <span id="toast-icon" class="toast-icon"></span>
      <span id="toast-message" class="toast-message"></span>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
